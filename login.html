<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PEAK.TRACK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
        rel="stylesheet" />
    <!--link de biblioteca de icones css-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="peaktrack.css" />
</head>

<body>

    <!-- Um único fundo + modal -->
    <div class="modal-login">
        <div class="modal" id="modal-login">

            <!-- Abas de alternância -->
            <div style="display: flex; gap: 8px; margin-bottom: 1.25rem;">
                <button class="btn btn-primary" id="btn-ir-login" style="flex:1;">Entrar</button>
                <button class="btn btn-ghost" id="btn-ir-cadastro" style="flex:1;">Criar conta</button>
            </div>

            <!-- Formulário de Login -->
            <div id="login-form">
                <h1 class="modal-title" style="margin-bottom: 1rem;">Login</h1>
                <div class="form-full">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="login-email" placeholder="exemplo@email.com" />
                </div>
                <div class="form-full">
                    <label class="form-label">Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••" />
                </div>
                <div style="margin-top: 1rem;">
                    <button class="btn-save" id="login-entrar" style="display:block;">Entrar</button>
                </div>
            </div>

            <!-- Formulário de Cadastro (oculto por padrão) -->
            <div id="register-form" style="display: none;">
                <h1 class="modal-title" style="margin-bottom: 1rem;">Criar conta</h1>
                <div class="form-row">
                    <div>
                        <label class="form-label">Nome completo</label>
                        <input type="text" id="register-nome" placeholder="João da Silva" />
                    </div>
                    <div>
                        <label class="form-label">Apelido</label>
                        <input type="text" id="register-apelido" placeholder="nickname25" />
                    </div>
                </div>
                <div class="form-full">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="register-email" placeholder="exemplo@email.com" />
                </div>
                <div class="form-row">
                    <div>
                        <label class="form-label">Criar senha</label>
                        <input type="password" id="register-senha" placeholder="••••••" />
                    </div>
                    <div>
                        <label class="form-label">Confirmar senha</label>
                        <input type="password" id="register-confirmar-senha" placeholder="••••••" />
                    </div>
                </div>
                <div style="margin-top: 1rem;">
                    <button class="btn-save" id="register-btn" style="display:block;">Criar conta</button>
                </div>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
