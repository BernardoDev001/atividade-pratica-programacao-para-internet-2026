<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
        rel="stylesheet" />
    <!--link de biblioteca de icones css-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="peaktrack.css" />
    <title>Login peaktrack</title>

</head>

<body>

    <div class="modal-login" id="register-form">
        <div class="modal">
            <div class="form-row">
                <h1 class="">cadastro</h1>
                <div>
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="register-nome" placeholder="ex João da Silva" />
                </div>
                <div>
                    <label class="form-label">e-mail</label>
                    <input type="email" id="register-email" placeholder="exemplo@email.com" />
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label class="form-label">Criar Senha</label>
                    <input type="password" id="register-senha" placeholder="******" />
                </div>
                <div>
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" id="register-confirmar-senha" placeholder="******" />
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label class="form-label">Apelido</label>
                    <input type="text" id="register-apelido" placeholder="nickname25" />
                </div>
            </div>
            <div class="form-actions">
                <button class="btn" id="register-btn">Criar conta</button>
            </div>
        </div>
    </div>
    <div class="modal-login" id="login-form">
        <div class="modal">
            <div class="form-row">
                <h1 class="">login</h1>
                <div>
                    <label class="form-label">e-mail</label>
                    <input type="email" id="login-email" placeholder="exemplo@email.com" />
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label class="form-label">senha</label>
                    <input type="password" id="login-senha" placeholder="******" />
                </div>
            </div>
            <div class="form-actions">
                <button class="btn" id="login-entrar">entrar</button>
                <button class="btn">cadastrar</button>
            </div>
        </div>
    </div>

</body>
<script src="login.js"></script>

</html>
